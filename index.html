<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ArTek WMS</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <header class="header">
    <div class="header-logo">
      <svg viewBox="0 0 400 140" xmlns="http://www.w3.org/2000/svg" height="30">
        <defs>
          <linearGradient id="mg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#ffffff"/>
            <stop offset="25%"  stop-color="#d8d8d8"/>
            <stop offset="50%"  stop-color="#b0b0b0"/>
            <stop offset="75%"  stop-color="#c8c8c8"/>
            <stop offset="100%" stop-color="#e8e8e8"/>
          </linearGradient>
        </defs>
        <g transform="skewX(-8) translate(30, 5)">
          <text x="0" y="105" font-family="'Arial Black','Impact',sans-serif" font-size="108" font-weight="900" letter-spacing="-2" fill="none" stroke="#111" stroke-width="14" stroke-linejoin="round" paint-order="stroke">ArTek</text>
          <text x="2" y="107" font-family="'Arial Black','Impact',sans-serif" font-size="108" font-weight="900" letter-spacing="-2" fill="#555" opacity="0.4">ArTek</text>
          <text x="0" y="105" font-family="'Arial Black','Impact',sans-serif" font-size="108" font-weight="900" letter-spacing="-2" fill="url(#mg)" stroke="#222" stroke-width="3" stroke-linejoin="round" paint-order="stroke">ArTek</text>
        </g>
      </svg>
    </div>
    <nav class="header-tabs">
      <button class="tab-btn active" id="tab-scan"    onclick="switchTab('scan')">Scan orders</button>
      <button class="tab-btn"        id="tab-package" onclick="switchTab('package')">Package orders</button>
      <button class="tab-btn"        id="tab-oor"     onclick="switchTab('oor')">OOR</button>
    </nav>
  </header>

  <!-- SCAN ORDERS LIST -->
  <div class="page active" id="page-scan">
    <div class="page-header">
      <div><h1>Scan orders</h1><p class="page-sub">Completed pick records</p></div>
      <button class="fab" onclick="showNewOrder()" aria-label="New order">+</button>
    </div>
    <div class="search-wrap">
      <input class="search-input" id="scanSearch" type="text" placeholder="Search order number…" oninput="filterScanOrders()" autocomplete="off"/>
    </div>
    <div id="orderList"></div>
  </div>

  <!-- NEW ORDER PAGE -->
  <div class="page" id="page-new-order">

    <!-- PHASE 1: LOOKUP -->
    <div id="phase-lookup">
      <div class="page-header">
        <div><h1>Scan order</h1><p class="page-sub">Enter or scan an OOR order number.</p></div>
      </div>
      <div class="section-label">Order number</div>
      <div class="field-row">
        <input type="text" id="orderNumber" placeholder="e.g. 242477" autocomplete="off"
          onkeydown="if(event.key==='Enter') lookupOrder()"/>
        <button class="scan-btn" onclick="openScanner('orderNumber')">&#9641;</button>
      </div>
      <div class="lookup-error" id="lookupError" style="display:none"></div>
      <div class="footer-actions">
        <button class="btn-exit" onclick="exitForm()">Exit</button>
        <button class="btn-save" id="lookupBtn" onclick="lookupOrder()">Look up order</button>
      </div>

      <!-- Session picks list -->
      <div id="sessionPicksWrap" style="display:none; margin-top:28px;">
        <div class="section-label">Picked this session</div>
        <div id="sessionPicksList"></div>
      </div>
    </div>

    <!-- PHASE 2: PICK -->
    <div id="phase-pick" style="display:none">
      <div class="pick-order-header" id="pickOrderHeader"></div>
      <div id="pickItemsList"></div>
      <div class="footer-actions" style="margin-top:24px">
        <button class="btn-exit" onclick="backToLookup()">Back</button>
        <button class="btn-save" id="savePickBtn" onclick="savePick()">Save pick</button>
      </div>
    </div>
  </div>

  <!-- PACKAGE ORDERS LIST -->
  <div class="page" id="page-package">
    <div class="page-header">
      <div><h1>Package orders</h1><p class="page-sub">Orders ready to package</p></div>
    </div>
    <div class="search-wrap">
      <input class="search-input" id="packageSearch" type="text" placeholder="Search order number…" oninput="filterPackageOrders()" autocomplete="off"/>
    </div>
    <div id="packageList"></div>
  </div>

  <!-- PACKAGE ORDER DETAIL -->
  <div class="page" id="page-package-detail">
    <div id="pkgOrderHeader"></div>
    <div id="pkgItemsList"></div>
    <div class="footer-actions pkg-footer">
      <button class="btn-exit" onclick="exitPackageDetail()">Back</button>
      <button class="btn-save" id="savePkgBtn" onclick="savePackageDraft()">Save for later</button>
    </div>
    <button class="btn-complete" id="completePkgBtn" onclick="completeOrder()">✓ Complete order &amp; generate tags</button>
  </div>

  <!-- OOR TAB -->
  <div class="page" id="page-oor">
    <div class="page-header">
      <div><h1>Open orders</h1><p class="page-sub">McMaster orders from 5/22 · sorted by order #</p></div>
    </div>
    <div class="search-wrap">
      <input class="search-input" id="oorSearch" type="text" placeholder="Search order # or location…" oninput="renderOOR()" autocomplete="off"/>
    </div>
    <div id="oorList"></div>
  </div>

  <!-- SCANNER MODAL -->
  <div class="scanner-overlay" id="scannerOverlay">
    <p class="scanner-field-label" id="scannerFieldLabel">Scanning…</p>
    <div class="scanner-wrap">
      <video id="scannerVideo" autoplay playsinline muted></video>
      <div class="scanner-reticle"></div>
      <div class="scanner-line"></div>
    </div>
    <p class="scanner-status" id="scannerStatus">Starting camera…</p>
    <button class="scanner-close" onclick="closeScanner()">Cancel</button>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
